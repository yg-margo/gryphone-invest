name: gryphone_invest
description: Gryphone Invest - Investment Portfolio Simulator
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.1
  fl_chart: ^0.68.0
  shared_preferences: ^2.2.2
  google_fonts: ^6.1.0
  intl: ^0.20.2
  uuid: ^4.3.3
  cupertino_icons: ^1.0.6
  image_picker: ^1.1.2
  http: ^1.2.1
  xml: ^6.5.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#0D0B1A"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  min_sdk_android: 21